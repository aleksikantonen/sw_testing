name: API tests

on:
  push:
    branches: ["**"]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: backend/api-tests/uv.lock

      - name: Lint with ruff
        run: uvx ruff check .
        working-directory: backend/api-tests

      - name: Install dependencies
        run: uv sync
        working-directory: backend/api-tests
      
      - name: Start app
        run: docker compose up -d --build --wait backend
        timeout-minutes: 10

      - name: Run API tests
        run: uv run pytest -v
        working-directory: backend/api-tests
